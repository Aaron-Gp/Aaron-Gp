name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: github
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # ========== 必须修改 ==========
          user: Aaron-Gp

          # ========== 基础配置 ==========
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          config_padding: 6%
          optimize: svg
          experimental_features: --optimize-svg

          # ========== 插件配置 ==========

          # 3D 贡献日历
          plugin_isocalendar: no
          plugin_isocalendar_duration: half-year

          # 语言分析
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6

          # 代码行数
          plugin_lines: yes

          # Star 趋势
          plugin_stargazers: no
          plugin_stargazers_charts_type: chartist

          plugin_topics: no
          plugin_topics_mode: icons
          plugin_topics_sort: activity

          plugin_16personalities: no
          plugin_16personalities_url: ${{ secrets.SIXTEEN_PERSONALITIES_URL }}
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_scores: no
